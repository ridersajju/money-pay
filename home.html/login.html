<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Pay - Login</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00ffd5;
            --primary-hover: #00d99f;
            --bg-dark: #0f172a;
            --bg-card: rgba(17, 24, 39, 0.7);
            --border-neon: rgba(0, 255, 213, 0.2);
            --border-neon-active: rgba(0, 255, 213, 0.6);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --success: #10ac84;
            --danger: #ee5253;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #090d16 0%, #111827 50%, #0f172a 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        /* Ambient Glowing Background Orbs */
        .orb {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 213, 0.12) 0%, transparent 70%);
            filter: blur(40px);
            z-index: 0;
            pointer-events: none;
            animation: floating 10s infinite ease-in-out;
        }

        .orb-1 {
            top: 10%;
            left: 15%;
        }

        .orb-2 {
            bottom: 10%;
            right: 15%;
            animation-delay: -5s;
        }

        @keyframes floating {
            0%, 100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-30px) scale(1.15);
            }
        }

        /* Glassmorphic Login Card */
        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            border: 1px solid var(--border-neon);
            padding: 40px 35px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 440px;
            z-index: 10;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -50%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to right,
                transparent,
                rgba(255, 255, 255, 0.03),
                transparent
            );
            transform: skewX(-25deg);
            transition: 0.75s;
            pointer-events: none;
        }

        .login-card:hover::before {
            left: 125%;
        }

        .login-card:hover {
            border-color: var(--border-neon-active);
            box-shadow: 0 20px 50px rgba(0, 255, 213, 0.08);
        }

        /* Logo & Header */
        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-area i {
            font-size: 2.8rem;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(0, 255, 213, 0.4);
            animation: pulse-glow 2s infinite ease-in-out;
            margin-bottom: 12px;
        }

        @keyframes pulse-glow {
            0%, 100% {
                transform: scale(1);
                text-shadow: 0 0 15px rgba(0, 255, 213, 0.4);
            }
            50% {
                transform: scale(1.08);
                text-shadow: 0 0 25px rgba(0, 255, 213, 0.8);
            }
        }

        .logo-area h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .logo-area p {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 300;
        }

        /* Forms Styling */
        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-label {
            display: block;
            color: var(--text-main);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 45px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-neon);
            border-radius: 12px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 213, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        .input-wrapper i.prefix-icon {
            position: absolute;
            left: 16px;
            color: var(--text-muted);
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }

        .input-wrapper input:focus + i.prefix-icon {
            color: var(--primary);
        }

        /* Password Toggle */
        .password-toggle {
            position: absolute;
            right: 16px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        /* Checkbox & Forgot Links */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.85rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
        }

        .remember-me input {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 1px solid var(--border-neon);
            border-radius: 4px;
            outline: none;
            background: rgba(15, 23, 42, 0.6);
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
        }

        .remember-me input:checked {
            background: var(--primary);
            border-color: var(--primary);
        }

        .remember-me input:checked::after {
            content: "\f00c";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            color: #090d16;
            font-size: 0.7rem;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .forgot-link {
            color: var(--primary);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .forgot-link:hover {
            color: var(--primary-hover);
            text-shadow: 0 0 8px rgba(0, 255, 213, 0.4);
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #090d16;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 213, 0.2);
            outline: none;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0, 255, 213, 0.5);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        .btn-submit i.spinner {
            display: none;
            animation: spin 1s infinite linear;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* Demo credentials display */
        .demo-credentials {
            margin-top: 25px;
            background: rgba(0, 255, 213, 0.05);
            border: 1px dashed rgba(0, 255, 213, 0.3);
            border-radius: 12px;
            padding: 12px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.5;
        }

        .demo-credentials span {
            color: var(--primary);
            font-weight: 500;
            cursor: pointer;
            text-decoration: underline;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .divider:not(:empty)::before {
            margin-right: .5em;
        }

        .divider:not(:empty)::after {
            margin-left: .5em;
        }

        /* Social buttons */
        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-social {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px;
            color: #ffffff;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            outline: none;
        }

        .btn-social:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        /* Custom Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 12px;
            background: #1e293b;
            color: #ffffff;
            border-left: 4px solid var(--primary);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateY(150%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            font-size: 0.9rem;
        }

        .toast.show {
            transform: translateY(0);
        }

        .toast-error {
            border-left-color: var(--danger);
        }

        .toast-success {
            border-left-color: var(--success);
        }

        .toast i {
            font-size: 1.1rem;
        }

        .toast-error i {
            color: var(--danger);
        }

        .toast-success i {
            color: var(--success);
        }
    </style>
</head>
<body>

    <!-- Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Login Container -->
    <div class="login-card">
        <div class="logo-area">
            <i class="fa-solid fa-wallet"></i>
            <h1>Money Pay</h1>
            <p>Enter details to access your account</p>
        </div>

        <form id="login-form">
            <!-- Email Field -->
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="name@domain.com" required autocomplete="email">
                    <i class="fa-solid fa-envelope prefix-icon"></i>
                </div>
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    <i class="fa-solid fa-lock prefix-icon"></i>
                    <button type="button" class="password-toggle" id="password-toggle" aria-label="Toggle password visibility">
                        <i class="fa-solid fa-eye" id="toggle-icon"></i>
                    </button>
                </div>
            </div>

            <!-- Options -->
            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="remember">
                    Remember me
                </label>
                <a href="#" class="forgot-link" id="forgot-link">Forgot Password?</a>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn-submit" id="btn-submit">
                <span>Sign In</span>
                <i class="fa-solid fa-circle-notch spinner" id="spinner"></i>
            </button>
        </form>

        <div class="demo-credentials">
            Demo Login: <span id="fill-demo">admin@moneypay.com / password123</span>
        </div>

        <div class="divider">or continue with</div>

        <!-- Social Sign In -->
        <div class="social-grid">
            <button type="button" class="btn-social" id="btn-google">
                <i class="fa-brands fa-google"></i>
                Google
            </button>
            <button type="button" class="btn-social" id="btn-github">
                <i class="fa-brands fa-github"></i>
                GitHub
            </button>
        </div>
    </div>

    <!-- Toast notification element -->
    <div id="toast" class="toast">
        <i id="toast-icon" class="fa-solid"></i>
        <span id="toast-message">Notification message</span>
    </div>

    <script>
        // Check if already logged in and redirect to home
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = './monthly-spend.html';
        }

        const loginForm = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const passwordToggleBtn = document.getElementById('password-toggle');
        const toggleIcon = document.getElementById('toggle-icon');
        const fillDemoBtn = document.getElementById('fill-demo');
        const forgotLink = document.getElementById('forgot-link');
        const submitBtn = document.getElementById('btn-submit');
        const spinner = document.getElementById('spinner');
        
        // Social login simulation alerts
        document.getElementById('btn-google').addEventListener('click', () => {
            showToast('Google login interface simulation.', 'error');
        });
        document.getElementById('btn-github').addEventListener('click', () => {
            showToast('GitHub login interface simulation.', 'error');
        });

        // Toggle Password visibility
        passwordToggleBtn.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        });

        // Fill Demo credentials
        fillDemoBtn.addEventListener('click', () => {
            emailInput.value = 'admin@moneypay.com';
            passwordInput.value = 'password123';
            showToast('Demo credentials filled!', 'success');
        });

        // Simulated Forgot Password click
        forgotLink.addEventListener('click', (e) => {
            e.preventDefault();
            showToast('Password reset link is simulated. Use the demo credentials!', 'success');
        });

        // Custom Toast function
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toast-icon');
            const toastMessage = document.getElementById('toast-message');

            toastMessage.textContent = message;
            toast.className = 'toast'; // Reset
            
            if (type === 'error') {
                toast.classList.add('toast-error');
                toastIcon.className = 'fa-solid fa-circle-exclamation';
            } else {
                toast.classList.add('toast-success');
                toastIcon.className = 'fa-solid fa-circle-check';
            }

            toast.classList.add('show');

            // Hide after 3.5s
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3500);
        }

        // Form validation & submit simulation
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            // Simple email validation regex
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showToast('Please enter a valid email address.', 'error');
                return;
            }

            // Password length validation
            if (password.length < 6) {
                showToast('Password must be at least 6 characters.', 'error');
                return;
            }

            // Authentication success logic (client-side simulation)
            submitBtn.disabled = true;
            submitBtn.style.opacity = '0.8';
            spinner.style.display = 'inline-block';
            submitBtn.querySelector('span').textContent = 'Authenticating...';

            setTimeout(() => {
                // Save login state in localstorage
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', email);

                showToast('Login successful! Redirecting...', 'success');

                // Redirect after toast displays for a moment
                setTimeout(() => {
                    window.location.href = './monthly-spend.html';
                }, 1000);
            }, 1500);
        });
    </script>
</body>
</html>
